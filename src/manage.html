<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Roster | SJSFI Library</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/manage.css">
</head>
<body>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <h3 id="loading-text">Processing...</h3>
    </div>

    <aside class="sidebar">
        <div class="brand">
            <div class="logo-circle">
                <img src="assets/images/sjsfi_school_logo.png" onerror="this.src='https://via.placeholder.com/48/10b981/ffffff?text=SJ'">
            </div>
            <div class="brand-text">
                <span class="brand-title">SJSFI</span>
                <span class="brand-subtitle">Library Attendance System</span>
            </div>
        </div>
        <nav>
            <a href="attendance.html" class="menu-item">
                <i class='bx bx-scan'></i> Scanner Mode
            </a>
            <a href="manage.html" class="menu-item active">
                <i class='bx bx-user-pin'></i> Student Roster
            </a>
            <a href="reports.html" class="menu-item">
                <i class='bx bx-bar-chart-alt-2'></i> Analytics & Reports
            </a>
            <a href="add-students.html" class="menu-item">
                <i class='bx bxs-user-detail'></i> Manage Students
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Student Roster</h1>
        </div>

        <div class="card">
            
            <div class="controls-bar">
                <div class="search-wrapper">
                    <i class='bx bx-search'></i>
                    <input type="text" id="searchInput" class="modern-input" placeholder="Search by name or ID..." oninput="applyFilters()">
                </div>
                
                <div class="filter-wrapper">
                    <select id="gradeFilter" class="modern-select" onchange="applyFilters()">
                        <option value="all">All Grades</option>
                        <option value="1">Grade 1</option>
                        <option value="2">Grade 2</option>
                        <option value="3">Grade 3</option>
                        <option value="4">Grade 4</option>
                        <option value="5">Grade 5</option>
                        <option value="6">Grade 6</option>
                    </select>
                </div>
                
                <div style="margin-left: auto;">
                    <button onclick="handleExportCSV()" class="btn-export">
                        <i class='bx bx-export'></i> Export CSV
                    </button>
                </div>
            </div>

            <div class="table-wrap">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>ID / Code</th>
                                <th>Grade Level</th>
                                <th>Date Registered</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTable"></tbody>
                    </table>
                </div>

                <div class="pagination">
                    <div class="footer-left">
                        <button id="toggleArchiveBtn" class="btn-recycle" onclick="toggleArchiveView()">
                            <i class='bx bx-recycle' style="font-size: 18px;"></i> 
                            <span>View Recycle Bin</span>
                        </button>
                    </div>

                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div class="page-info" id="pageInfo">Showing 0 records</div>
                        <div style="display:flex; gap: 8px;">
                            <button class="page-btn flex-center" id="prevBtn" onclick="changePage(-1)">
                                <i class='bx bx-chevron-left'></i> Prev
                            </button>
                            <button class="page-btn flex-center" id="nextBtn" onclick="changePage(1)">
                                Next <i class='bx bx-chevron-right'></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="editModal" class="custom-modal-overlay">
        <div class="custom-modal">
            <div class="modal-header">
                <h3><i class='bx bx-edit'></i> Edit Student Record</h3>
                <button class="close-btn" onclick="closeEditModal()">
                    <i class='bx bx-x'></i>
                </button>
            </div>
            
            <div class="modal-body">
                <input type="hidden" id="editId">
                
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="editName" class="modern-input" style="width: 100%; box-sizing: border-box;">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Grade Level</label>
                    <select id="editGrade" class="modern-select" style="width: 100%; box-sizing: border-box;">
                        <option value="1">Grade 1</option>
                        <option value="2">Grade 2</option>
                        <option value="3">Grade 3</option>
                        <option value="4">Grade 4</option>
                        <option value="5">Grade 5</option>
                        <option value="6">Grade 6</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Update Profile Picture</label>
                    <div class="photo-upload-box">
                        <div id="editPreviewContainer" class="photo-preview">
                            <img id="editImagePreview" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                            <div id="editPlaceholder" style="color: #94a3b8;">
                                <i class='bx bx-user' style="font-size: 24px;"></i>
                            </div>
                        </div>
                        <input type="file" id="editPhotoInput" accept="image/*" style="font-size: 12px; width: 100%; cursor: pointer;">
                    </div>
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button onclick="saveEdit()" class="btn-confirm">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="assets/js/manage.js"></script>
</body>
</html>
